# Xiaohongshu MCP sidecar — runs alongside the OpenShell sandbox.

services:
  xiaohongshu-mcp:
    build:
      context: ../../xiaohongshu-mcp
      dockerfile: Dockerfile
    container_name: xiaohongshu-mcp
    restart: unless-stopped
    init: true
    tty: true
    shm_size: "2gb"
    volumes:
      - ./data/xhs:/app/data
      - ./data/images:/app/images
    environment:
      - ROD_BROWSER_BIN=/usr/bin/google-chrome
      - COOKIES_PATH=/app/data/cookies.json
    ports:
      - "127.0.0.1:18060:18060"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2025-03-26\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}},\"id\":1}' --header='Content-Type: application/json' http://localhost:18060/mcp || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
