# OpenShell sandbox policy for Zeptoclaw Gateway
#
# Principle: deny all by default, explicitly allow only what zeptoclaw needs.
# Network policies are hot-reloadable: openshell policy set <name> --policy policy.yaml

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /dev/urandom
    - /etc
    - /var/log
    # /proc: only expose safe metadata; block /proc/*/mem, /proc/*/environ,
    # /proc/*/maps etc. to prevent the agent from dumping process memory.
    - /proc/cpuinfo
    - /proc/meminfo
    - /proc/loadavg
    - /proc/uptime
    - /proc/version
    - /proc/sys
    - /proc/self/status
    - /proc/self/stat
    - /proc/self/cgroup
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:

  # =====================================================================
  # LLM Providers — uncomment the ones you use
  # =====================================================================

  anthropic:
    name: anthropic
    endpoints:
      - { host: api.anthropic.com, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }

  openai:
    name: openai
    endpoints:
      - { host: api.openai.com, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }

  azure_openai:
    name: azure-openai
    endpoints:
      - { host: helios-ai-openai-gpt5-resource.openai.azure.com, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }

  # openrouter:
  #   name: openrouter
  #   endpoints:
  #     - { host: openrouter.ai, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
  #   binaries:
  #     - { path: /usr/local/bin/zeptoclaw }

  # google_gemini:
  #   name: google-gemini
  #   endpoints:
  #     - { host: generativelanguage.googleapis.com, port: 443 }
  #   binaries:
  #     - { path: /usr/local/bin/zeptoclaw }

  # =====================================================================
  # Channel APIs
  # =====================================================================

  discord_api:
    name: discord-api
    endpoints:
      - { host: discord.com, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
      - { host: cdn.discordapp.com, port: 443, tls: terminate }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }

  discord_gateway:
    name: discord-gateway
    endpoints:
      - { host: gateway.discord.gg, port: 443, tls: skip }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }

  # telegram:
  #   name: telegram
  #   endpoints:
  #     - { host: api.telegram.org, port: 443 }
  #   binaries:
  #     - { path: /usr/local/bin/zeptoclaw }

  # =====================================================================
  # MCP sidecars
  # =====================================================================

  xiaohongshu_mcp:
    name: xiaohongshu-mcp
    endpoints:
      # 172.17.0.1 = default Docker bridge gateway on Linux
      - { host: 172.17.0.1, port: 18060 }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }

  # =====================================================================
  # Web access — search engines and common web domains
  # OpenShell rejects bare `host: "*"`, so we enumerate TLD-level patterns.
  # =====================================================================

  web_search:
    name: web-search
    endpoints:
      - { host: "*.duckduckgo.com", port: 443, tls: terminate }
      - { host: "*.brave.com", port: 443, tls: terminate }
      - { host: "*.search.brave.com", port: 443, tls: terminate }
      - { host: "*.searxng.com", port: 443, tls: terminate }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }

  web_fetch_l1:
    name: web-fetch-l1
    endpoints:
      - { host: "*.com", port: 443, tls: terminate }
      - { host: "*.org", port: 443, tls: terminate }
      - { host: "*.net", port: 443, tls: terminate }
      - { host: "*.io", port: 443, tls: terminate }
      - { host: "*.dev", port: 443, tls: terminate }
      - { host: "*.li", port: 443, tls: terminate }
      - { host: "*.cn", port: 443, tls: terminate }
      - { host: "*.me", port: 443, tls: terminate }
      - { host: "*.cc", port: 443, tls: terminate }
      - { host: "*.co", port: 443, tls: terminate }
      - { host: "*.info", port: 443, tls: terminate }
      - { host: "*.app", port: 443, tls: terminate }
      - { host: "*.xyz", port: 443, tls: terminate }
      - { host: "*.com", port: 80 }
      - { host: "*.org", port: 80 }
      - { host: "*.net", port: 80 }
      - { host: "*.io", port: 80 }
      - { host: "*.li", port: 80 }
      - { host: "*.cn", port: 80 }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }

  web_fetch_l2:
    name: web-fetch-l2
    endpoints:
      - { host: "*.*.com", port: 443, tls: terminate }
      - { host: "*.*.org", port: 443, tls: terminate }
      - { host: "*.*.net", port: 443, tls: terminate }
      - { host: "*.*.io", port: 443, tls: terminate }
      - { host: "*.*.dev", port: 443, tls: terminate }
      - { host: "*.*.li", port: 443, tls: terminate }
      - { host: "*.*.cn", port: 443, tls: terminate }
      - { host: "*.*.me", port: 443, tls: terminate }
      - { host: "*.*.cc", port: 443, tls: terminate }
      - { host: "*.*.co", port: 443, tls: terminate }
      - { host: "*.*.info", port: 443, tls: terminate }
      - { host: "*.*.app", port: 443, tls: terminate }
      - { host: "*.*.xyz", port: 443, tls: terminate }
      - { host: "*.*.com", port: 80 }
      - { host: "*.*.org", port: 80 }
      - { host: "*.*.net", port: 80 }
      - { host: "*.*.io", port: 80 }
      - { host: "*.*.li", port: 80 }
      - { host: "*.*.cn", port: 80 }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }

  web_fetch_l3:
    name: web-fetch-l3
    endpoints:
      - { host: "*.*.*.com", port: 443, tls: terminate }
      - { host: "*.*.*.org", port: 443, tls: terminate }
      - { host: "*.*.*.net", port: 443, tls: terminate }
      - { host: "*.*.*.io", port: 443, tls: terminate }
      - { host: "*.*.*.cn", port: 443, tls: terminate }
      - { host: "*.*.*.co", port: 443, tls: terminate }
    binaries:
      - { path: /usr/local/bin/zeptoclaw }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }

  # =====================================================================
  # Shell tool — git (read-only by default)
  # =====================================================================

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/**/info/refs*"
          - allow:
              method: POST
              path: "/**/git-upload-pack"
    binaries:
      - { path: /usr/bin/git }

  github_rest_api:
    name: github-rest-api
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/**"
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/local/bin/zeptoclaw }

  # =====================================================================
  # Package managers
  # =====================================================================

  pypi:
    name: pypi
    endpoints:
      - { host: pypi.org, port: 443 }
      - { host: files.pythonhosted.org, port: 443 }
    binaries:
      - { path: /usr/local/bin/uv }
      - { path: "/sandbox/.venv/bin/pip" }
      - { path: "/sandbox/.venv/bin/python" }
      - { path: "/sandbox/.venv/bin/python3" }
      - { path: "/sandbox/.uv/python/**" }

  npm_registry:
    name: npm-registry
    endpoints:
      - { host: registry.npmjs.org, port: 443 }
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/npm }
